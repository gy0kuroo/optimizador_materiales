{% extends 'cutless/base.html' %}
{% load static %}

{% block content %}
  <header class="page-header fade-in">
    <div class="page-header__text">
      <h1 class="page-title">Eliminar optimización</h1>
      <p class="page-lead">Confirma que deseas eliminar la optimización #{{ numero_mostrado }}. Esta acción no se puede deshacer.</p>
    </div>
    <div class="page-header__actions">
      <a href="{% url 'cutless:historial' %}" class="btn btn-outline-secondary">Volver</a>
    </div>
  </header>

  <div class="card fade-in">
    <div class="card-header card-header-section card-header-section--danger">
      <h4 class="mb-0">Confirmar eliminación</h4>
    </div>
    <div class="card-body">
      <form method="post" data-tipo="optimizacion">
        {% csrf_token %}
        <div class="form-action-bar">
          <a href="{% url 'cutless:historial' %}" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn btn-danger">Sí, eliminar optimización</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
